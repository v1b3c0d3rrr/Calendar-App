# Динамические веса исследователей
# Обновляются через /review на основе performance_log

base_weights:
  cc: 0.40  # Cluster Analyst — нарративы, скоринг, peer comparison
  cg: 0.35  # Evidence Analyst — evidence-first, TA, конфликт-детекция
  g: 0.25   # Due Diligence — ончейн, команда, red flags

# Корректировки по контексту
# Формат: context_adjustments[parameter][value][researcher] = adjustment (-0.5 to +0.5)
# effective_weight = base_weight × (1 + avg(applicable_adjustments)), затем нормализация до sum=1

context_adjustments:

  market_trend:
    bull:
      cc: 0.0     # Нет данных — начальное значение
