# Эмпирические пороги из калибровочного исследования
# Дата: 2026-03-11
# Выборка: 17 winners, 4 control, 5 losers (MC <$30M)
# Data provided by CoinGecko (https://www.coingecko.com/en/api/)
#
# ВАЖНО: Выборка мала для статистической значимости.
# Пороги — ориентиры, не жёсткие правила. Не overfit.

# ===== DISCRIMINATING METRICS (по predictive power) =====

vol_mc_ratio:
  description: "Volume 24h / Market Cap — strongest leading indicator"
  timeframe: "T-7"
  winners_median: 0.054
  control_median: 0.0011
  losers_median: 0.0076
  discrimination_ratio: 7.2  # winners / losers
  thresholds:
    strong_buy: 0.10  # very strong accumulation
    buy: 0.03         # strong signal
    neutral: 0.005    # minimal activity
    avoid: 0.001      # dead token

mc_fdv_ratio:
  description: "Market Cap / FDV — scarcity indicator (LOWER = BETTER for micro)"
  winners_median: 0.156
  control_median: 0.782
  losers_median: 0.738
  discrimination_ratio: 4.7  # inverted: losers / winners
  thresholds:
    strong_buy: 0.10  # extreme scarcity
    buy: 0.30         # good scarcity
    neutral: 0.70     # most supply unlocked
    avoid: 0.90       # fully unlocked, no growth potential
  note: "REVERSED from traditional view. Low MC/FDV = BULLISH for micro-cap (scarcity premium), NOT red flag"

supply_ratio:
  description: "Circulating Supply / Total Supply"
  winners_median: 0.370
  control_median: 0.680
  losers_median: 0.978
  thresholds:
    buy: 0.40         # <40% circulating = scarcity
    neutral: 0.80
    avoid: 0.90       # almost fully circulating

price_change_7d:
  description: "Price change over 7 days at T-7 — early momentum"
  timeframe: "T-7"
  winners_median: 6.37   # %
  control_median: -1.96  # %
  losers_median: -9.00   # %
  thresholds:
    buy: 0.0      # positive momentum
    neutral: -10.0
    avoid: -15.0   # strong downtrend

volume_absolute:
  description: "Average 7-day volume in USD"
  timeframe: "T-7"
  winners_median: 702000    # $702K
  control_median: 56000     # $56K
  losers_median: 85000      # $85K
  thresholds:
    strong_buy: 2000000  # >$2M
    buy: 500000          # >$500K
    neutral: 100000      # >$100K
    avoid: 50000         # <$50K = illiquid

# ===== NON-DISCRIMINATING (do not rely on alone) =====

github_presence:
  description: "Has GitHub repos"
  winners_pct: 59
  losers_pct: 60
  note: "Does NOT discriminate. Equal between winners and losers."

telegram_users:
  description: "Telegram channel user count"
  winners_median: 7426
  losers_median: 10885
  note: "INVERSE signal — losers have MORE telegram users. Do not use as positive signal."

