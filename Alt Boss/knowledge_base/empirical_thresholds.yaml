# ===== CLUSTER-SPECIFIC THRESHOLDS (121 winners, excl DEX/stables/tokenized) =====

cluster_A_deep_recovery:
  count: 35
  description: "Fell >70% from ATH, quick reversal from bottom"
  identification: "ath_drawdown < -70%"
  key_signal: "Volume при падающей цене = smart money on the bottom"
  thresholds:
    vol_mc_entry: 0.015   # > 1.5%
    price_direction: "negative (still falling at T-7: -12% median)"
    volatility: "high (10.3% median)"
    mc_fdv: 0.50  # higher than other clusters (already unlocked)
    supply_ratio: 0.96  # high — NOT a disqualifier for this type
    stop_loss: "-20% to -30%"

cluster_B_gradual_accumulation:
  count: 17
  description: "Moderate -30-70% drawdown, long sideways (28d), then pump"
  identification: "ath_drawdown between -30% and -70% AND accumulation_days > 14"
  key_signal: "Тишина перед штормом: low volatility + scarcity + stable price"
  thresholds:
    volatility_max: 5.0  # < 5% — quietest cluster
    price_7d: "stable ±5%"
    mc_fdv: 0.25  # lowest — best scarcity
    supply_ratio: 0.46  # low — scarce
    vol_mc_entry: 0.008  # lower requirement (volume not the signal here)
    stop_loss: "-15% to -20%"

cluster_C_breakout_sideways:
  count: 32
  description: "Trading in range near ATH, breaks out"
  identification: "ath_drawdown > -40% AND accumulation_days < 14"
  key_signal: "Close to ATH + low MC/FDV. Volume signal WEAKEST here (1.1%)"
  thresholds:
    ath_drawdown_max: -40  # not too far from ATH
    mc_fdv: 0.32
    volatility: "5-8% (moderate)"
    vol_mc_entry: 0.005  # very low requirement — volume not the signal
    catalyst_required: true  # need a trigger for breakout
    stop_loss: "-10% to -15%"

cluster_D_momentum_continuation:
  count: 7
  description: "Already rising, growth continues. Rarest pattern."
  identification: "ath_drawdown > -30% AND (pre_trend_30d > 10% OR pre_trend_7d > 5%)"
  key_signal: "ONLY cluster with RISING volume trend (1.62x). Momentum builds."
  thresholds:
    vol_trend_min: 1.3  # volume INCREASING toward T-0
    vol_mc_entry: 0.02
    ath_drawdown_max: -30
    stop_loss: "-10% to -15% (trailing)"
  note: "Includes ORE (49x) — rare but highest potential"

cluster_E_v_reversal:
  count: 37
  description: "Sharp drop → sharp bounce. Capitulation + instant recovery."
  identification: "ath_drawdown -40% to -70% AND accumulation_days < 5 AND volatility > 10%"
  key_signal: "EXTREME Vol/MC 16.4% (15x higher than C_breakout). Capitulation volume."
  thresholds:
    vol_mc_entry: 0.05   # > 5% — high bar but characteristic
    volatility_min: 10.0  # must be volatile
    pre_trend_30d: -30  # fast drop preceding the bounce
    stop_loss: "-25% to -35% (very wide — high volatility)"
  note: "Biggest winners: ANDY70B 165x, 9BIT 11x, XPIN 11x. Highest risk/reward."

# ===== COMBO RULES =====

buy_combo:
  description: "All 3 factors together = 0 losers get BUY at any reasonable threshold"
  rules:
    - "vol_mc > 0.03"
    - "mc_fdv < 0.30"
    - "price_7d > 0%"
  min_rules: 2  # at least 2 of 3
  backtest_result:
    threshold_50: { hit_rate: 65, fp_rate: 0, catastrophic_fp: 0 }
    threshold_45: { hit_rate: 71, fp_rate: 20, catastrophic_fp: 1 }

